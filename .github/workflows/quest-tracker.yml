name: Quest Tracker

on:
  # Trigger on PR merge to dev or main
  pull_request:
    types: [closed]
    branches: [dev, main]

jobs:
  check-quests:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract quest references
        id: quests
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          echo "PR Title: $PR_TITLE"
          echo "PR Branch: $PR_BRANCH"
          echo "PR Author: $PR_AUTHOR"

          # Extract quest IDs from title, body, and branch
          # Supports both Q-### (open source demo) and PROJECTKEY-### (Jira) patterns
          QUEST_IDS=$(echo "$PR_TITLE $PR_BODY $PR_BRANCH" | grep -oiE '(Q-[0-9]+|[A-Z]+-[0-9]+)' | sort -u | tr '\n' ',' | sed 's/,$//')

          echo "Found quest references: $QUEST_IDS"
          echo "quest_ids=$QUEST_IDS" >> $GITHUB_OUTPUT
          echo "author=$PR_AUTHOR" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Post celebration comment
        if: steps.quests.outputs.quest_ids != ''
        uses: actions/github-script@v7
        with:
          script: |
            const questIds = '${{ steps.quests.outputs.quest_ids }}'.split(',');
            const author = '${{ steps.quests.outputs.author }}';

            const body = [
              '## Quest Complete!',
              '',
              `**@${author}** just completed: ${questIds.map(id => '`' + id.toUpperCase() + '`').join(', ')}`,
              '',
              'Points will be awarded on the next sync cycle.',
              '',
              '> *"The quest board grows lighter..."*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
